<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMT-Science-Club</title>
    <link
      rel="shortcut icon"
      href="./images/logo/favicon.ico"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Glowing Background Effect -->
    <div class="bg-overlay">
      <div
        class="particle"
        style="
          width: 8px;
          height: 8px;
          top: 75%;
          left: 10%;
          animation-duration: 6s;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 6px;
          height: 6px;
          top: 45%;
          left: 25%;
          animation-duration: 5s;
          animation-delay: 1s;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 10px;
          height: 10px;
          top: 85%;
          left: 50%;
          animation-duration: 7s;
          animation-delay: 2s;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 5px;
          height: 5px;
          top: 35%;
          left: 75%;
          animation-duration: 4s;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 8px;
          height: 8px;
          top: 90%;
          left: 88%;
          animation-duration: 8s;
          animation-delay: 1.5s;
        "
      ></div>
    </div>

    <div class="wrapper">
      <nav>
        <div class="logo">
          <img src="./images/logo/logo.png" alt="logo" />
        </div>
        <div class="menu">
          <ul>
            <li><a href="">Home</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Team</a></li>
            <li><a href="">Gallery</a></li>
            <li><a href="">Events</a></li>
          </ul>
        </div>
        <div>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdLYfPIxQSMBwg4mQ-YQnGcOHpe96biTij8s1gbxH0e2iranQ/viewform" class="nav-btn" target="_blank">Join Us</a>          
        </div>
      </nav>

      <!-- 2. Hero Main Content -->
      <main class="hero-content">
        <!-- Left Text Content -->
        <section class="text-section">
          <h1>
            Science for Society,<br/> <span
              class="blue-glow"
              >Innovation</span
            > for Humanity
         
          </h1>
          <br>
          <p>
            Welcome to <span class="blue-glow">AMT Science Club</span>, where curiosity meets discovery.
            Explore the mysteries of the universe and deep science with us.
          </p>
          <br>
          <div class="hero-btns">
            <a href="#" class="hero-btn btn-primary">About Us</a>
            <a href="#" class="hero-btn btn-secondary">Join Us</a>
          </div>
        </section>

        <!-- Right Visual Elements -->
        <section class="visuals-section">
          <!-- Floating DNA -->
          <svg
            class="dna-svg"
            viewBox="0 0 100 200"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M20 20C40 60 40 100 20 140"
              stroke="#3f7ef7"
              stroke-width="4"
            />
            <path
              d="M80 20C60 60 60 100 80 140"
              stroke="#b0b8d9"
              stroke-width="4"
            />
            <path d="M20 30L80 30" stroke="#3f7ef7" stroke-width="2" />
            <path d="M25 50L75 50" stroke="#b0b8d9" stroke-width="2" />
            <path d="M28 70L72 70" stroke="#3f7ef7" stroke-width="2" />
            <path d="M25 90L75 90" stroke="#b0b8d9" stroke-width="2" />
            <path d="M20 110L80 110" stroke="#3f7ef7" stroke-width="2" />
            <path d="M25 130L75 130" stroke="#b0b8d9" stroke-width="2" />
          </svg>

          <!-- Rotating Atom -->
          <svg
            class="atom-svg"
            viewBox="0 0 100 100"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle cx="50" cy="50" r="10" fill="#3f7ef7" />
            <ellipse
              cx="50"
              cy="50"
              rx="40"
              ry="15"
              stroke="#fff"
              stroke-width="1.5"
              transform="rotate(30, 50, 50)"
            />
            <ellipse
              cx="50"
              cy="50"
              rx="40"
              ry="15"
              stroke="#fff"
              stroke-width="1.5"
              transform="rotate(150, 50, 50)"
            />
            <ellipse
              cx="50"
              cy="50"
              rx="40"
              ry="15"
              stroke="#fff"
              stroke-width="1.5"
            />
          </svg>

          <!-- Microscope Outline -->
          <svg
            class="microscope-outline"
            viewBox="0 0 100 150"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M20 130V20C20 10 30 5 50 5C70 5 80 10 80 20V130M10 140H90M50 70H70M50 90H70"
              stroke="#fff"
              stroke-width="3"
            />
          </svg>
        </section>
      </main>      
   

    <!-- Our misseion section start -->
    <section>
       
    </section>



  </body>
</html>
